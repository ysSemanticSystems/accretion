name: Bug report
description: Something broken — build, physics regression, Godot load, or gameplay
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Include versions and the output of `make check` if relevant.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      placeholder: Describe the failure or incorrect behavior.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. `make check`
        2. Open Godot 4.7, run Main.tscn
        3. ...
    validations:
      required: true
  - type: input
    id: versions
    attributes:
      label: Environment
      placeholder: "OS, Rust (rustc --version), Godot version, astropy version"
    validations:
      required: true
